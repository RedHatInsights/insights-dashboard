apiVersion: v1
kind: Template
metadata:
  name: insights-dashboard
objects:
  - apiVersion: cloud.redhat.com/v1alpha1
    kind: Frontend
    metadata:
      name: dashboard
    spec:
      envName: ${ENV_NAME}
      deploymentRepo: https://github.com/RedHatInsights/insights-dashboard
      title: Dashboard
      image: ${IMAGE}:${IMAGE_TAG}
      API:
        versions:
          - v1
      frontend:
        paths:
          - /apps/dashboard
      module:
        analytics:
          APIKey: apRCg9V6oMXCcnTingqRYW6m1er4hkCW
          APIKeyDev: aMINBssUhXV1okzk7ZBaqwdTgtA0ySpg
        manifestLocation: /apps/dashboard/fed-mods.json
        config:
          supportCaseData:
            product: Red Hat Insights
            version: Dashboard
        modules:
          - id: dashboard
            module: ./RootApp
            routes:
              - pathname: /insights/dashboard
parameters:
  - name: ENV_NAME
    required: true
  - name: IMAGE_TAG
    required: true
  - name: IMAGE
    value: quay.io/cloudservices/insights-dashboard-frontend
